[timing]
; Clicks per second. Clamped in code to 1..1000.
cps=12

; Random per-click timing variation in milliseconds. 0 gives the most exact cadence.
jitter_ms=0

[mouse]
; 0 = left click, 1 = right click.
button=0

[hotkeys]
; Values are Windows virtual-key codes in decimal.
; Defaults: F6 toggle, F7 exit, F8 slower, F9 faster, F10 swap button,
; F11 jitter down, F12 jitter up.
toggle=117
exit=118
slower=119
faster=120
button=121
jitter_down=122
jitter_up=123
